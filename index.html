<script>
  function updateNav() {
    const pages = [
      { id: 'home', title: 'Hjem' },
      { id: 'about', title: 'Om oss' },
      { id: 'prayer', title: 'Bønnetider' },
      { id: 'events', title: 'Arrangementer' },
      { id: 'donate', title: 'Donasjon' },
      { id: 'contact', title: 'Kontakt' }
    ];
    
    const deskNav = document.getElementById('deskNav');
    const mobNav = document.getElementById('mobNav');
    
    pages.forEach(p => {
      const a = document.createElement('a');
      a.href = '#';
      a.innerText = p.title;
      a.onclick = (e) => { e.preventDefault(); go(p.id); };
      deskNav.appendChild(a);
      
      const ma = a.cloneNode(true);
      mobNav.appendChild(ma);
    });
  }
  
  function go(pageId) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-' + pageId).classList.add('active');
  }

  updateNav();
</script>
